<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Мини-анкета</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: system-ui, sans-serif;
      background: #f5f5f5;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 1rem;
    }
    .card {
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 2px 12px rgba(0,0,0,.1);
      padding: 2rem;
      width: 100%;
      max-width: 560px;
    }
    h1 { font-size: 1.5rem; margin-bottom: 1.5rem; color: #222; }
    .question { margin-bottom: 1.25rem; }
    label { display: block; font-weight: 500; margin-bottom: .4rem; color: #333; }
    input[type="text"] {
      width: 100%;
      padding: .55rem .75rem;
      border: 1px solid #ccc;
      border-radius: 8px;
      font-size: 1rem;
      transition: border-color .2s;
    }
    input[type="text"]:focus { outline: none; border-color: #4f8ef7; }
    button {
      margin-top: 1rem;
      width: 100%;
      padding: .75rem;
      background: #4f8ef7;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 1rem;
      cursor: pointer;
      transition: background .2s;
    }
    button:hover { background: #3a7ae4; }
    button:disabled { background: #aaa; cursor: not-allowed; }
    #thank-you {
      display: none;
      text-align: center;
      padding: 2rem 0;
    }
    #thank-you h2 { font-size: 1.75rem; color: #4f8ef7; margin-bottom: .5rem; }
    #thank-you p { color: #555; }
    #error-msg { color: #d9534f; margin-top: .75rem; font-size: .9rem; }
  </style>
</head>
<body>
  <div class="card">
    <div id="form-section">
      <h1>Анкета</h1>
      <form id="survey-form"></form>
      <p id="error-msg"></p>
    </div>
    <div id="thank-you">
      <h2>Спасибо!</h2>
      <p>Ваши ответы успешно отправлены.</p>
    </div>
  </div>

  <script>
    async function loadQuestions() {
      const res = await fetch('/questions');
      if (!res.ok) throw new Error('Не удалось загрузить вопросы');
      return res.json();
    }

    function renderForm(questions) {
      const form = document.getElementById('survey-form');
      questions.forEach(q => {
        const div = document.createElement('div');
        div.className = 'question';
        div.innerHTML = `
          <label for="q${q.id}">${q.text}</label>
          <input type="text" id="q${q.id}" name="q${q.id}" required placeholder="Ваш ответ">
        `;
        form.appendChild(div);
      });

      const btn = document.createElement('button');
      btn.type = 'submit';
      btn.textContent = 'Отправить';
      form.appendChild(btn);

      form.addEventListener('submit', e => submitForm(e, questions));
    }

    async function submitForm(e, questions) {
      e.preventDefault();
      const btn = e.target.querySelector('button[type="submit"]');
      const errEl = document.getElementById('error-msg');
      errEl.textContent = '';
      btn.disabled = true;

      const answers = questions.map(q => ({
        question_id: q.id,
        text: document.getElementById(`q${q.id}`).value.trim(),
      }));

      try {
        const res = await fetch('/answers', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(answers),
        });
        if (!res.ok) throw new Error(`Ошибка сервера: ${res.status}`);

        document.getElementById('form-section').style.display = 'none';
        document.getElementById('thank-you').style.display = 'block';
      } catch (err) {
        errEl.textContent = err.message;
        btn.disabled = false;
      }
    }

    loadQuestions()
      .then(renderForm)
      .catch(err => {
        document.getElementById('error-msg').textContent = err.message;
      });
  </script>
</body>
</html>
